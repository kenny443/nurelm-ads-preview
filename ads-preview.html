const ads = [
  {id:1,theme:"Lemur Product",intro:"Running a clinical trial with wearables? Stop building data infrastructure from scratch. Lemur gives you pre-configured smartwatches, HIPAA-compliant cloud, and near real-time data ·onboard participants in under 10 minutes.",headline:"Wearable Data Collection Made Simple",description:"Turnkey wearable data platform built with NIH & top universities. Focus on science ·not engineering.",cta:"Learn More",source:"Post 4",campaign:1},
  {id:2,theme:"Lemur Product",intro:"You shouldn't have to become a tech company to collect sensor data. Lemur handles motion, heart rate, and GPS from smartwatches ·so you can focus on your research.",headline:"Less Setup. More Science.",description:"Pre-configured smartwatches + HIPAA-compliant cloud. Currently powering a 3-year NIMH clinical trial.",cta:"Learn More",source:"Post 4",campaign:1},
  {id:3,theme:"Lemur Product",intro:"Wearable data collection for clinical trials is hard. Watch batteries die, apps crash, connections drop. We spent years solving these problems so you don't have to.",headline:"We Solved Wearable Data Collection",description:"Lemur: turnkey sensor data from smartwatches. Built with Pitt + CMU. Trusted by NIH-funded trials.",cta:"Learn More",source:"Post 7",campaign:1},
  {id:4,theme:"Lemur Product",intro:"Getting real-time motion, GPS, and heart rate data from a smartwatch? Anyone who's tried knows it's brutal. Lemur handles the engineering ·you handle the research.",headline:"Stop Fighting Wearable Tech",description:"Near real-time data collection. HIPAA-compliant. Onboard participants in 10 minutes.",cta:"Contact Us",source:"Post 7",campaign:1},
  {id:5,theme:"Lemur Product",intro:"Your clinical trial needs reliable wearable data ·not months of engineering headaches. Lemur is a trial-ready platform used in active NIH-funded studies right now.",headline:"Trial-Ready Wearable Data Platform",description:"Built by NuRelm with University of Pittsburgh & Carnegie Mellon. Proven in active clinical trials.",cta:"Learn More",source:"Post 10",campaign:1},
  {id:6,theme:"Patient Engagement",intro:"Old-school ugly apps lose participants, data, and outcomes. Your clinical trial app needs to be as good as every other app on their phone.",headline:"Your Trial App Is Losing Participants",description:"Beautiful patient engagement platforms that boost retention and complete data collection.",cta:"Learn More",source:"Post 8",campaign:1},
  {id:7,theme:"Patient Engagement",intro:"Keeping patients engaged in a clinical trial isn't optional ·it's everything. The key? Apps that feel less like a chore and more like a tool they actually want to use.",headline:"Patient Engagement That Actually Works",description:"Smart notifications. Passive sensing. Personalized support. Built for researchers who need complete data.",cta:"Learn More",source:"Post 8",campaign:1},
  {id:8,theme:"Patient Engagement",intro:"MoodRing uses passive sensing to reduce data entry burden. BRITEPath uses smart design to keep participants connected. Both were built by NuRelm for real research teams.",headline:"Apps That Keep Participants Engaged",description:"Passive sensing + engaging UX = better retention, complete data, and better outcomes.",cta:"Learn More",source:"Post 8",campaign:1},
  {id:9,theme:"Patient Engagement",intro:"Better digital engagement = more participants stay on board = complete data = better outcomes. It starts with building apps people actually want to use.",headline:"Stop Losing Trial Participants",description:"We build patient-focused digital engagement platforms for clinical trials and mental health tools.",cta:"Contact Us",source:"Post 8",campaign:1},
  {id:10,theme:"Patient Engagement",intro:"Your participants are used to TikTok and Instagram. Then you hand them a clunky trial app. No wonder retention is a problem.",headline:"Your Trial App Needs an Upgrade",description:"We build patient engagement platforms as polished as the apps your participants already love.",cta:"Learn More",source:"Post 8",campaign:1},
  {id:11,theme:"Thought Leadership - AI",intro:"AI coding feels like magic ·until your prototype needs to scale. Then the 'vibe coding tax' kicks in: black box code, architectural drift, security blind spots.",headline:"The Hidden Cost of Vibe Coding",description:"AI is powerful for prototyping. But production systems need architectural discipline. We provide both.",cta:"Learn More",source:"Post 2",campaign:3},
  {id:12,theme:"Thought Leadership - AI",intro:"52% of AI-generated coding answers are wrong. 45% contain security vulnerabilities. But they sound so confident you won't notice until it's too late.",headline:"AI Code Looks Right. Until It Doesn't.",description:"Building software that needs to be funded or audited? You need more than vibes.",cta:"Contact Us",source:"Post 2",campaign:3},
  {id:13,theme:"Thought Leadership - AI",intro:"You can vibe code a 1.0. But 2.0 requires refactoring ·and AI hallucinates more when the codebase is messy. That's the maintenance wall.",headline:"Beyond the Prototype Phase",description:"AI productivity gains are only sustainable with deep technical oversight. 26+ years of it.",cta:"Learn More",source:"Post 2",campaign:3},
  {id:14,theme:"Thought Leadership - AI",intro:"AI is doubling code churn. It fixes File A by breaking File Z. Without a senior architect steering, your software becomes a patchwork of conflicting patterns.",headline:"AI Needs an Architect",description:"Software that matters needs more than AI-generated code. It needs 26 years of engineering discipline.",cta:"Learn More",source:"Post 2",campaign:3},
  {id:15,theme:"Thought Leadership - AI",intro:"The more powerful the AI engine, the more vital the driver. We've been that driver for 26 years ·for NIH-funded trials, university research, and production systems.",headline:"AI Is the Engine. We're the Driver.",description:"Sustainable software development powered by AI + architectural integrity since 1999.",cta:"Learn More",source:"Post 2",campaign:3},
  {id:16,theme:"Case Studies",intro:"A force sensor + smart glasses + our software = prosthetic users optimizing their gait between PT visits. That's MovisuFit ·built with University of Pittsburgh.",headline:"Software That Connects to Real Life",description:"We build apps that bridge hardware and humans. From prosthetics to wearables to clinical trials.",cta:"Learn More",source:"Post 9",campaign:2},
  {id:17,theme:"Case Studies",intro:"LemurDx grabs real-time smartwatch data, analyzes it in the cloud, and generates objective measures of hyperactivity. Funded by NIMH. Built by NuRelm + CMU + Pitt.",headline:"Objective ADHD Measurement via Smartwatch",description:"Real-time wearable data → cloud analysis → contextualized hyperactivity metrics. Active trial now.",cta:"Learn More",source:"Post 9",campaign:1},
  {id:18,theme:"Case Studies",intro:"WheelFit reads sensors in a wheelchair to measure energy usage. MovisuFit uses smart glasses for prosthetic training. We connect software to the real world.",headline:"3 Projects That Improve Lives",description:"From prosthetics to wheelchairs to wearables ·we build software that bridges research and real impact.",cta:"Learn More",source:"Post 9",campaign:2},
  {id:19,theme:"Case Studies",intro:"Researchers at University of Pittsburgh needed to know if their bed scale could handle real-world conditions. We helped them build and test hardware for the first time.",headline:"From Software to Hardware",description:"NuRelm's first hardware project: FIT bed scales for wheelchair users. Built with Pitt + EPD Electronics.",cta:"Learn More",source:"Post 1",campaign:2},
  {id:20,theme:"Case Studies",intro:"A scale that wheelchair users can use by simply transferring into bed. A basic tool most people take for granted ·made possible by smart engineering.",headline:"Making the Everyday Accessible",description:"FIT bed scales: giving wheelchair users a tool everyone else takes for granted.",cta:"Learn More",source:"Post 1",campaign:2},
  {id:21,theme:"SBIR/Grant Expertise",intro:"We've helped university researchers raise millions through NIH's SBIR program. We know the process ·because we've been through it 6 or 7 times ourselves.",headline:"We Know the SBIR Process Inside Out",description:"From proposal to funded project. We help researchers commercialize their innovations via SBIR/STTR.",cta:"Learn More",source:"Post 4",campaign:2},
  {id:22,theme:"SBIR/Grant Expertise",intro:"Your SBIR grant needs software that works on time and on budget. We've been the software partner on multi-million dollar NIH grants for over a decade.",headline:"Software That Secures Your Grant",description:"We help make the software foundational to multi-million dollar grants work well and on time.",cta:"Contact Us",source:"Post 10",campaign:2},
  {id:23,theme:"SBIR/Grant Expertise",intro:"Grant reviewers want to see a credible technical partner. With 26 years and multiple SBIR projects, NuRelm gives your proposal the engineering credibility it needs.",headline:"Strengthen Your SBIR Proposal",description:"26 years of SBIR experience. NIH-funded. Partnered with Pitt, CMU, Yale, UCLA.",cta:"Learn More",source:"Post 10",campaign:2},
  {id:24,theme:"SBIR/Grant Expertise",intro:"We submitted our first SBIR proposal 6 or 7 times before getting funded. That persistence taught us exactly what reviewers want ·and how to deliver.",headline:"SBIR Funding: We've Been There",description:"From repeated rejections to funded projects. We bring hard-won SBIR expertise to your team.",cta:"Contact Us",source:"Post 1",campaign:2},
  {id:25,theme:"SBIR/Grant Expertise",intro:"Turning a research idea into a funded product? We've done it with NIH, NIMH, Pitt, CMU. From brainstorm to prototype to multi-year clinical trial.",headline:"From Research Idea to Funded Product",description:"We help researchers brainstorm, prototype, budget, and deliver. 26 years of experience.",cta:"Learn More",source:"Post 10",campaign:2},
  {id:26,theme:"University Partnerships",intro:"University of Pittsburgh. Carnegie Mellon. Yale. UCLA. Temple. We've been building research software with top universities for over 26 years.",headline:"Trusted by Top Research Universities",description:"Custom software for clinical trials, digital health, and behavioral research. Since 1999.",cta:"Learn More",source:"Post 9",campaign:2},
  {id:27,theme:"University Partnerships",intro:"CMU's HCI Institute. Pitt's Department of Psychiatry. Pitt's School of Health and Rehabilitation Sciences. Our partners push boundaries ·we build the software.",headline:"Built With the Best in Research",description:"NuRelm partners with world-class research institutions to build software that matters.",cta:"Learn More",source:"Post 9",campaign:2},
  {id:28,theme:"University Partnerships",intro:"We've been the technical partner behind breakthrough research at America's top universities. From wearables to mental health apps to clinical trial platforms.",headline:"The Technical Partner Behind Breakthrough Research",description:"26 years building custom software for university innovators. NIH-funded. HIPAA-compliant.",cta:"Learn More",source:"Post 10",campaign:2},
  {id:29,theme:"Digital Health",intro:"From adolescent depression to ADHD ·we've seen firsthand the potential of real-time wearable data to transform behavioral health research.",headline:"Digital Health Apps That Transform Research",description:"Mobile apps + wearable data + cloud analytics. Built for researchers who change lives.",cta:"Learn More",source:"Post 10",campaign:1},
  {id:30,theme:"Digital Health",intro:"Real-time data from smartwatches, GPS, and heart rate monitors is transforming behavioral health research. But the engineering is brutal ·unless you have the right partner.",headline:"Wearable Data Without the Engineering Pain",description:"We handle the data infrastructure. You focus on the discovery.",cta:"Contact Us",source:"Post 10",campaign:1},
  {id:31,theme:"Digital Health",intro:"MoodRing reduces data entry burden with passive sensing. No more survey fatigue. No more incomplete datasets. Just better data, automatically.",headline:"Passive Sensing for Better Data",description:"Reduce participant burden. Increase data quality. MoodRing shows how it's done.",cta:"Learn More",source:"Post 8",campaign:1},
  {id:32,theme:"Digital Health",intro:"Depression. ADHD. Addiction. We've built apps that address them all ·with passive sensing, smart notifications, and designs that keep people engaged.",headline:"Apps for the Hardest Problems in Mental Health",description:"From MoodRing to LemurDx ·digital health solutions backed by NIH funding and top universities.",cta:"Learn More",source:"Post 8",campaign:1},
  {id:33,theme:"Team/Culture",intro:"100% in-house. Entirely flat structure. Everyone collaborates directly with clients. No outsourcing. No hand-offs. Just quality software.",headline:"Quality Over Growth Since 1999",description:"NuRelm: a close-knit team that's been building software that matters for 26 years.",cta:"Learn More",source:"General",campaign:2},
  {id:34,theme:"Team/Culture",intro:"We're not trying to be the biggest. We're trying to be the best. Flat team. Direct client collaboration. 26 years of building software that matters.",headline:"Software Built by People Who Care",description:"No layers. No outsourcing. Every NuRelm engineer works directly with you.",cta:"Contact Us",source:"General",campaign:2},
  {id:35,theme:"Team/Culture",intro:"When we say 'built by people who care' ·we mean the same people who talk to you are the ones writing your code. No hand-offs. No surprises.",headline:"Meet Your Actual Development Team",description:"At NuRelm, the people you meet are the people who build your software. Always.",cta:"Learn More",source:"General",campaign:2},
  {id:36,theme:"Lemur - Speed",intro:"Onboard a clinical trial participant onto Lemur in under 10 minutes. Pre-configured smartwatch. Real-time data flowing. Done.",headline:"10-Minute Participant Onboarding",description:"Lemur makes wearable data collection fast and frictionless for clinical trials.",cta:"Learn More",source:"Post 4",campaign:1},
  {id:37,theme:"Lemur - Reliability",intro:"Watch OS kills background apps. Batteries die. Connections drop. We've spent years solving every wearable reliability problem so your trial data stays intact.",headline:"Wearable Data You Can Actually Trust",description:"Lemur overcomes every technical barrier between smartwatches and reliable research data.",cta:"Learn More",source:"Post 7",campaign:1},
  {id:38,theme:"Lemur - ML",intro:"Need more than raw sensor data? Lemur offers optional ML pipelines, custom EMAs, and UI development on top of the wearable data collection platform.",headline:"Beyond Data Collection",description:"Lemur: from raw sensor data to ML-powered insights. Optional pipelines tailored to your study.",cta:"Learn More",source:"Post 4",campaign:1},
  {id:39,theme:"Lemur - Cost",intro:"Building a custom wearable data pipeline costs months and hundreds of thousands. Lemur gives you the same capability ·tested, proven, and ready today.",headline:"Skip the $500K Data Pipeline Build",description:"Lemur is a turnkey wearable data platform. Perfected over years with NIH, Pitt, and CMU.",cta:"Contact Us",source:"Post 10",campaign:1},
  {id:40,theme:"Lemur - Active Trial",intro:"Lemur isn't theoretical ·it's powering a 3-year NIMH-funded clinical trial on hyperactivity right now. Battle-tested. Production-ready.",headline:"Proven in a 3-Year Clinical Trial",description:"The Lemur Data Collection System: currently active in NIH-funded hyperactivity research.",cta:"Learn More",source:"Post 4",campaign:1},
  {id:41,theme:"Vibe Coding - CTO",intro:"Your AI-generated codebase passed the demo. But can it pass an audit? Can it scale? Can your team actually maintain it?",headline:"Can Your AI Code Survive an Audit?",description:"AI is great for prototyping. Production needs architectural discipline. We've provided it for 26 years.",cta:"Contact Us",source:"Post 2",campaign:3},
  {id:42,theme:"Vibe Coding - Startup",intro:"Vibe coded your MVP? Congratulations. Now you need to scale it ·and the code nobody understands is about to become your most expensive problem.",headline:"Your MVP Has a Hidden Debt",description:"We help founders go from prototype to production with code that's built to last.",cta:"Contact Us",source:"Post 2",campaign:3},
  {id:43,theme:"Vibe Coding - Security",intro:"In controlled tests, AI introduced security vulnerabilities in nearly half of all tasks. If your software handles health data, that's not just a bug ·it's a breach.",headline:"AI-Generated Code Has a Security Problem",description:"Building HIPAA-compliant software? You need human architects who understand security. We have 26 years.",cta:"Contact Us",source:"Post 2",campaign:3},
  {id:44,theme:"Vibe Coding - Refactoring",intro:"You can vibe code version 1.0. But when 2.0 needs refactoring, AI hallucinates more ·because your codebase is now a mess it helped create.",headline:"The Version 2.0 Problem",description:"AI productivity is real. But sustainable software needs architectural integrity from day one.",cta:"Learn More",source:"Post 2",campaign:3},
  {id:45,theme:"Vibe Coding - Research",intro:"If you're building software that needs to be funded, audited, or scaled ·you need more than vibes beyond the prototype phase.",headline:"Software That Survives Peer Review",description:"NIH-funded. HIPAA-compliant. Built with architectural discipline for 26 years.",cta:"Contact Us",source:"Post 2",campaign:3},
  {id:46,theme:"APA/Conference",intro:"We don't just build research software ·we show up to research conferences. APA 2025 in Denver was a blast. Let's connect at the next one.",headline:"We Go Where Researchers Go",description:"NuRelm: exhibiting at APA and building relationships with the research community since 1999.",cta:"Learn More",source:"Post 5/6",campaign:2},
  {id:47,theme:"APA/Conference",intro:"Great conversations at APA 2025 in Denver. If you're a researcher who needs a technical partner for your next wearable study, let's talk.",headline:"Met Us at APA? Let's Keep Talking.",description:"NuRelm builds wearable data collection systems for behavioral health researchers.",cta:"Contact Us",source:"Post 6",campaign:2},
  {id:48,theme:"Hardware + Software",intro:"We just shipped our first custom hardware product ·FIT bed scales for wheelchair users. Built with EPD Electronics and University of Pittsburgh.",headline:"From Software Company to Hardware + Software",description:"26 years of software. Now adding custom hardware. Because solving real problems sometimes means building real things.",cta:"Learn More",source:"Post 3",campaign:2},
  {id:49,theme:"Hardware + Software",intro:"A bed scale for wheelchair users. Sounds simple. But making it reliable, accurate, and easy to use required real engineering ·from software AND hardware.",headline:"Engineering Accessibility",description:"FIT bed scales: a basic tool most people take for granted, made possible by NuRelm + Pitt.",cta:"Learn More",source:"Post 1",campaign:2},
  {id:50,theme:"Accessibility",intro:"A scale that wheelchair users can use by simply transferring into bed. It sounds obvious ·but it took serious engineering to make it real.",headline:"Technology for Everyone",description:"NuRelm builds tools that make basic tasks accessible. Like weighing yourself from your bed.",cta:"Learn More",source:"Post 1",campaign:2},
  {id:51,theme:"Lemur - Researcher Pain",intro:"You got the grant. You designed the study. Now you need wearable data ·and suddenly you're debugging Bluetooth, fighting watch OS, and managing cloud infrastructure.",headline:"Sound Familiar? There's a Better Way.",description:"Lemur handles the engineering nightmare of wearable data collection. You focus on your study.",cta:"Learn More",source:"Post 7",campaign:1},

function renderTable(filteredAds) {

function filterAds() {
  const theme = document.getElementById('themeFilter').value;
  const campaign = document.getElementById('campaignFilter').value;
  const search = document.getElementById('searchBox').value.toLowerCase();

  let filtered = ads;
  if (theme !== 'all') filtered = filtered.filter(a => a.theme === theme);
  if (campaign !== 'all') filtered = filtered.filter(a => a.campaign === parseInt(campaign));
  if (search) filtered = filtered.filter(a =>
    a.intro.toLowerCase().includes(search) ||
    a.headline.toLowerCase().includes(search) ||
    a.description.toLowerCase().includes(search) ||
    a.theme.toLowerCase().includes(search)
  );

  document.getElementById('adCount').textContent = `Showing ${filtered.length} / ${ads.length}`;
  renderCards(filtered);
  renderTable(filtered);
}

let currentView = 'cards';
function setView(view) {
  currentView = view;
  document.querySelectorAll('.view-toggle button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('adsGrid').classList.toggle('hidden', view !== 'cards');
  document.getElementById('adsTable').classList.toggle('hidden', view !== 'table');
  document.getElementById('adsTable').style.display = view === 'table' ? 'block' : 'none';
}

// Review system (localStorage)
function getReviews() {
  try { return JSON.parse(localStorage.getItem('nurelm_reviews') || '{}'); } catch { return {}; }
}
function getReview(id) { return getReviews()[id]?.status || ''; }
function getComment(id) { return getReviews()[id]?.comment || ''; }

function setReview(id, status) {
  const reviews = getReviews();
  if (!reviews[id]) reviews[id] = {};
  reviews[id].status = reviews[id].status === status ? '' : status;
  localStorage.setItem('nurelm_reviews', JSON.stringify(reviews));
  filterAds();
  updateSummary();
}

function setComment(id, comment) {
  const reviews = getReviews();
  if (!reviews[id]) reviews[id] = {};
  reviews[id].comment = comment;
  localStorage.setItem('nurelm_reviews', JSON.stringify(reviews));
  updateSummary();
}

function updateSummary() {
  const reviews = getReviews();
  let approve = 0, maybe = 0, reject = 0;
  Object.values(reviews).forEach(r => {
    if (r.status === 'approve') approve++;
    if (r.status === 'maybe') maybe++;
    if (r.status === 'reject') reject++;
  });
  document.getElementById('approveCount').textContent = `Approved: ${approve}`;
  document.getElementById('maybeCount').textContent = `Maybe: ${maybe}`;
  document.getElementById('rejectCount').textContent = `Rejected: ${reject}`;
  document.getElementById('pendingCount').textContent = `Pending: ${100 - approve - maybe - reject}`;
}

function exportReview() {
  const reviews = getReviews();
  let csv = 'Ad_ID,Theme,Status,Comment,Headline\\n';
  ads.forEach(ad => {
    const r = reviews[ad.id] || {};
    const status = r.status || 'pending';
    const comment = (r.comment || '').replace(/"/g, '""');
    csv += `${ad.id},"${ad.theme}",${status},"${comment}","${ad.headline}"\\n`;
  });
  const blob = new Blob([csv.replace(/\\n/g, '\n')], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'nurelm-ads-review.csv'; a.click();
}

// Initial render
filterAds();
updateSummary();
